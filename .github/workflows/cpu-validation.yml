name: CPU Validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            julia-version: "1.12"
          - os: macos-latest
            julia-version: "1.12"
          - os: windows-latest
            julia-version: "1.12"
    env:
      JULIA_NUM_THREADS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v3

      - name: Instantiate
        run: julia --project=. --startup-file=no -e 'using Pkg; Pkg.instantiate()'

      - name: Run full test suite
        run: julia --project=. --startup-file=no -e 'using Pkg; Pkg.test()'

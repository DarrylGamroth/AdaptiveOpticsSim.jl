name: CUDA Backend Validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cuda:
    runs-on: [self-hosted, linux, cuda]
    timeout-minutes: 120
    env:
      JULIA_NUM_THREADS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Install CUDA weak dependency
        run: julia --project=. --startup-file=no -e 'using Pkg; Pkg.add("CUDA"); Pkg.instantiate()'

      - name: Run maintained CUDA smoke
        run: julia --project=. --startup-file=no scripts/gpu_smoke_cuda.jl

      - name: Run maintained CUDA runtime equivalence
        run: julia --project=. --startup-file=no scripts/gpu_runtime_equivalence_cuda.jl

name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      JULIA_NUM_THREADS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: "1.12"

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v3

      - name: Instantiate
        run: julia --project=. --startup-file=no -e 'using Pkg; Pkg.instantiate()'

      - name: Run test suite with coverage
        run: julia --project=. --startup-file=no -e 'using Pkg; Pkg.test(coverage=true)'

      - name: Run KA CPU matrix with coverage
        run: julia --project=. --startup-file=no --code-coverage=user test/ka_cpu_runtests.jl

      - name: Process combined Julia coverage
        uses: julia-actions/julia-processcoverage@v1
        with:
          directories: src,ext

      - name: Upload combined coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          disable_search: true
          fail_ci_if_error: true
          name: adaptiveopticssim-combined
          use_oidc: true

name: AMDGPU Backend Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  amdgpu:
    runs-on: [self-hosted, linux, amdgpu]
    timeout-minutes: 120
    env:
      JULIA_NUM_THREADS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: "1.12"

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v3

      - name: Instantiate AMDGPU test project
        run: julia --project=test/amdgpu --startup-file=no -e 'using Pkg; Pkg.instantiate()'

      - name: Run maintained AMDGPU hardware target
        run: julia --project=test/amdgpu --startup-file=no test/runtests_amdgpu.jl

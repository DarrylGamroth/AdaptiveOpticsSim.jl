name: AMDGPU Backend Validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  amdgpu:
    runs-on: [self-hosted, linux, amdgpu]
    timeout-minutes: 120
    env:
      JULIA_NUM_THREADS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Install AMDGPU weak dependency
        run: julia --project=. --startup-file=no -e 'using Pkg; Pkg.add("AMDGPU"); Pkg.instantiate()'

      - name: Run maintained AMDGPU smoke
        run: julia --project=. --startup-file=no scripts/gpu_smoke_amdgpu.jl

      - name: Run maintained AMDGPU runtime equivalence
        run: julia --project=. --startup-file=no scripts/gpu_runtime_equivalence_amdgpu.jl

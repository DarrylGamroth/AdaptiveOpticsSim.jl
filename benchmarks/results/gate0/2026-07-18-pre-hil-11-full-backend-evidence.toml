allowed_cpus = "0-15"
architecture = "x86_64"
blas_config = "LBTConfig([ILP64] libopenblas64_.so)"
blas_threads = 1
command = "julia --project=benchmarks benchmarks/benchmark_gate0_latency.jl"
cpu_model = "AMD Ryzen 7 6800H with Radeon Graphics"
cpu_target = "znver3"
fft_threads = 1
git_commit = "51d8580cdfd91cf8e0f1a2395a11ad0d0f830c58"
git_dirty = false

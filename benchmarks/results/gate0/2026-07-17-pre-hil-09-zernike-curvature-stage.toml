[contract]
absolute_gate_scope = "regression safety bound for these compact cards, not an RTC deadline or production-size capability claim"
arrival_model = "the next operation starts after the previous operation and histogram recording complete"
coordinated_omission_correction = false
coordinated_omission_reason = "these cards measure serial service time and do not make a fixed-arrival-rate claim"
correctness_oracle = "test/reference_data_gate0 plus maintained OOPAO and SPECULA reference bundles"
first_use = "recorded separately after construction and before warmup; package import is excluded"
load_model = "closed_loop"
tail_claim = "p99 is gated with 100 expected observations beyond p99 per 10000-sample run; p99.9 is diagnostic"
threading = "one Julia thread, one BLAS thread, one FFT provider thread"
timed_boundary = "prepared input and workspace available through mutation of the declared output/state"
timer = "time_ns; the final clock read is included, histogram recording is excluded from latency and included in achieved throughput"


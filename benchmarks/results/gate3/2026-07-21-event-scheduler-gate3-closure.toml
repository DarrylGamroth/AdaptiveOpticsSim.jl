evidence_class = "warmed in-process serial CPU scheduler service cost"
first_use_ns = 1953
minimum_samples_for_p99 = 10000
p99_claim_supported = true
schema_version = 1
scope_exclusions = ["package import, scheduler preparation, construction, and first-use compilation", "fixed-rate arrivals, wall-clock pacing, queues, overload, and recovery", "detector, trigger, command, optical-path, publication, or transport work", "parallel execution, GPU execution, and host-device transfer", "CPU affinity, isolation, governor control, NUMA placement, and interrupt placement", "external-RTC latency, production instrument capacity, or heap-policy crossover claims"]
source_contract = "contracts/gate3_event_scheduler.toml"

[contract]
allocation_gate = "zero Julia heap bytes for one warmed timed-boundary operation"
arrival_model = "the next scheduler operation starts after the prior operation and histogram recording complete"
coordinated_omission_correction = false
coordinated_omission_reason = "the benchmark characterizes unpaced scheduler service cost and makes no fixed-arrival latency claim"
correctness_oracle = "exact timestamp, ordinal, and occurrence sequence; declaration-order-independent simultaneous-event scan; fixed registry/cursor/due-slot lengths; and the maintained plant-scheduler unit suite"
latency_gate = "descriptive generator-count scaling evidence only; no external-RTC or production latency threshold is asserted"
load_model = "closed-loop self-paced serial service-cost characterization; this is not an AO control loop or HIL pacing test"
question = "Across the maintained 1-to-256 active-generator range, does the fixed-capacity serial linear-scan scheduler preserve exact event order, keep storage proportional to prepared capacity rather than event count, and execute one warmed scan/claim/reschedule cycle without Julia heap allocation?"
tail_claim = "p99 is reported with at least 100 expected observations beyond p99 per run; p99.9 is diagnostic"
threading = "one Julia thread, one BLAS thread, and one FFT provider thread"
timed_boundary = "linearly scan the fixed active registry, claim the minimum logical plant event, compute its next timestamp by checked integer-duration addition, and reschedule the same generator"
timer = "time_ns; the final clock read is included, while histogram recording is excluded from latency and included in achieved throughput"


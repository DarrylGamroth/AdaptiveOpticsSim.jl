notes = "On this 8-core host and 8-member micro-workload, reusable AcceleratedKernels partitioning had the best median offline throughput. Julia Threads also improved median throughput but had wider tails. Dagger was intentionally evaluated in a process-local scope and had much higher overhead; retain it for task topology, locality, and process/node scaling rather than small local latency. These closed-loop samples do not model fixed-rate arrivals, do not establish a tail-latency SLO, and do not apply to direct external-RTC HIL stepping. Rebenchmark member size/count and FFT/BLAS partitioning on EPYC or Threadripper hardware before choosing a production policy."

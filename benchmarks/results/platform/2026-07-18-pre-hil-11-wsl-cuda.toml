[contract]
arrival_model = "no independent arrival schedule"
backend_ready_boundary = "reset pupil OPD; extrapolate and scatter the physical DM command; apply the DM; form the diffractive Shack-Hartmann optical product; perform noiseless CMOS acquisition; tile the 352x352 frame; synchronize every participating backend array"
baseline_interpretation = "Relative p95 limits use the July 14 diagnostic artifact solely as a predeclared regression reference; the clean-revision artifacts produced by this contract become the maintained baseline."
coordinated_omission_correction = false
coordinated_omission_reason = "this contract measures serial service time, not response time under scheduled arrivals"
first_use_interpretation = "first measured operation on the benchmark context after an untimed parity pass has compiled the path; cold package load, precompilation, and context construction are excluded"
gpu_ready_interpretation = "backend-ready means the synchronized result is available in backend-native storage; it does not imply that every AMDGPU implementation detail avoided documented host-mirror compatibility boundaries"
host_ready_boundary = "backend-ready boundary followed by a copy into one preallocated 352x352 host Matrix{Float32}"
load_model = "one warmed serial operation starts only after the preceding operation completes"
tail_interpretation = "With 500 observations per run, p50, p95, and max are reported; p95 has 25 expected exceedances and p99 is intentionally not claimed."
timer = "time_ns; clock and histogram-recording overhead is reported and is not subtracted"
transfer_only_boundary = "copy the already-complete backend frame into one preallocated 352x352 host Matrix{Float32}"
workload = "REVOLT-like 277-command DM and 16x16 diffractive Shack-Hartmann acquisition exported as one 352x352 Float32 frame"


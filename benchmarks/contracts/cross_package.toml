version = 1

[metadata]
status = "active"
description = "Cross-package benchmark scenario contracts for AdaptiveOpticsSim, OOPAO, and SPECULA-aligned surfaces."

[scenarios.cp01_compact_reference]
family = "CP-01"
class = "compact"
kind = "reference_fidelity"
description = "Frozen compact reference fidelity surfaces from the committed OOPAO and SPECULA bundles."
baselines = ["oopao", "specula"]
metrics = ["max_abs_error", "max_rel_error", "l2_rel_error"]

[scenarios.cp02_revolt_sh_medium]
family = "CP-02"
class = "medium"
kind = "runtime_profile"
description = "REVOLT-like Shack-Hartmann runtime comparison between the package-local main runner and the external REVOLT/Julia runner."
comparison_fields = ["backend", "response_mode", "n_subap", "wfs_sensor"]
normalized_fields = ["backend", "response_mode", "n_subap", "wfs_sensor"]
known_differences = [
    "pupil_resolution",
    "wfs_frame_response",
    "detector_output_shape",
    "dm_command_layout",
    "science_detector_payload",
]
runtime_metrics = ["build_time_ns", "total_mean_ns", "total_p95_ns", "frame_rate_hz", "total_alloc_bytes"]
primary_comparison = "revolt_julia"

[scenarios.cp02_revolt_sh_medium.main]
label = "adaptiveopticssim_main"
cwd = "."
command = ["julia", "--project=.", "--startup-file=no", "scripts/profile_revolt_hil_runtime.jl", "cpu", "benchmarks/assets/revolt_like", "cmos", "default", "none"]
profile_root = "revolt_like_hil_runtime_profile"
mean_key = "total_mean_ns"
p95_key = "total_p95_ns"
frame_rate_key = "frame_rate_hz"
alloc_key = "total_alloc_bytes"

[scenarios.cp02_revolt_sh_medium.main.field_aliases]
backend = "backend"
response_mode = "response_mode"
n_subap = "n_subap"
wfs_sensor = "sensor"

[scenarios.cp02_revolt_sh_medium.revolt_julia]
label = "revolt_julia"
cwd = "../REVOLT/Julia"
command = ["julia", "--project=.", "--startup-file=no", "runners/profile_revolt_runtime.jl", "cpu", "shwfs", "default"]
profile_root = "revolt_hil_runtime_profile"
mean_key = "total_mean_ns"
p95_key = "total_p95_ns"
frame_rate_key = "frame_rate_hz"
alloc_key = "total_alloc_bytes"

[scenarios.cp02_revolt_sh_medium.revolt_julia.field_aliases]
backend = "backend"
response_mode = "response_mode"
n_subap = "n_subap"
wfs_sensor = "wfs_detector_sensor"

[scenarios.cp02_revolt_sh_medium.revolt_specula]
label = "revolt_specula"
cwd = "../REVOLT/Python/specula"
command = ["python3", "revolt.py"]
profile_root = "revolt_specula_runtime_profile"
mean_key = "total_mean_ns"
p95_key = "total_p95_ns"
frame_rate_key = "frame_rate_hz"
alloc_key = "total_alloc_bytes"
optional = true

[scenarios.cp03_revolt_pwfs_representative]
family = "CP-03"
class = "representative"
kind = "runtime_profile"
description = "REVOLT-like representative PWFS modal SCAO comparison between the package-local main runner and the external REVOLT/Julia runner."
comparison_fields = ["backend", "response_mode", "model", "wfs_family", "n_subap", "wfs_detector_sensor", "science_detector_sensor", "pupil_resolution", "wfs_frame_response", "detector_output_shape"]
normalized_fields = ["backend", "response_mode", "model", "wfs_family", "n_subap", "wfs_detector_sensor", "science_detector_sensor", "pupil_resolution", "wfs_frame_response", "detector_output_shape"]
known_differences = [
    "gain_detector_runtime_path",
    "reconstructor_build_method",
    "timing_breakdown_implementation",
]
runtime_metrics = ["build_time_ns", "total_mean_ns", "total_p95_ns", "frame_rate_hz", "total_alloc_bytes"]
primary_comparison = "revolt_julia"

[scenarios.cp03_revolt_pwfs_representative.main]
label = "adaptiveopticssim_main"
cwd = "."
command = ["julia", "--project=.", "--startup-file=no", "scripts/profile_revolt_pwfs_runtime.jl", "cpu", "pwfs_unmod", "default", "2", "1"]
profile_root = "revolt_pwfs_runtime_profile"
mean_key = "total_mean_ns"
p95_key = "total_p95_ns"
frame_rate_key = "frame_rate_hz"
alloc_key = "total_alloc_bytes"

[scenarios.cp03_revolt_pwfs_representative.main.field_aliases]
backend = "backend"
response_mode = "response_mode"
model = "model"
wfs_family = "wfs_family"
n_subap = "n_subap"
wfs_detector_sensor = "wfs_detector_sensor"
science_detector_sensor = "science_detector_sensor"
pupil_resolution = "pupil_resolution"
wfs_frame_response = "wfs_frame_response"
detector_output_shape = "detector_output_shape"

[scenarios.cp03_revolt_pwfs_representative.revolt_julia]
label = "revolt_julia"
cwd = "../REVOLT/Julia"
command = ["julia", "--project=.", "--startup-file=no", "runners/profile_revolt_runtime.jl", "cpu", "pwfs_unmod", "default", "2", "1"]
profile_root = "revolt_hil_runtime_profile"
mean_key = "total_mean_ns"
p95_key = "total_p95_ns"
frame_rate_key = "frame_rate_hz"
alloc_key = "total_alloc_bytes"

[scenarios.cp03_revolt_pwfs_representative.revolt_julia.field_aliases]
backend = "backend"
response_mode = "response_mode"
model = "model"
wfs_family = "wfs_family"
n_subap = "n_subap"
wfs_detector_sensor = "wfs_detector_sensor"
science_detector_sensor = "science_detector_sensor"
pupil_resolution = "pupil_resolution"
wfs_frame_response = "wfs_frame_response"
detector_output_shape = "detector_output_shape"

[scenarios.cp05_specula_atmo_field_medium]
family = "CP-05"
class = "medium"
kind = "runtime_profile"
status = "contract_only"
description = "SPECULA-aligned atmospheric-field and curvature-through-atmosphere benchmark family; contract recorded, execution deferred until an external runnable scenario is normalized into the harness."
skip_reason = "SPECULA provides AtmoPropagation configs/tests but no maintained executable benchmark runner with comparable atmospheric-field and curvature runtime outputs in the current neighboring trees"

[scenarios.cp06_revolt_platform_medium]
family = "CP-06"
class = "medium"
kind = "runtime_profile"
status = "contract_only"
description = "Grouped platform runtime comparison family retained historically in the core package; external comparison-workspace re-anchor is deferred until a distinct external orchestration surface is normalized."
comparison_fields = ["backend", "scale", "runtime_resolution", "runtime_n_subap", "runtime_branch_count"]
normalized_fields = ["backend", "scale", "runtime_resolution", "runtime_n_subap", "runtime_branch_count"]
known_differences = [
    "typed_control_loop_scenario_surface",
    "grouped_export_stack_contract",
    "composite_runtime_entrypoint_shape",
]
runtime_metrics = ["total_mean_ns", "total_p95_ns", "frame_rate_hz", "total_alloc_bytes"]
skip_reason = "external comparison workspace now owns the harness, but a distinct grouped-platform external runner has not yet been normalized beyond the core-package platform runtime surface"

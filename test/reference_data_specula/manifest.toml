version = 1

[metadata]
specula_repo_path = "/home/dgamroth/workspaces/codex/SPECULA"
bundle_kind = "contract_bundle"
baseline = "specula"
description = "Frozen SPECULA-targeted reference cases derived from maintained local scenarios aligned to SPECULA test contracts."

[cases.atmospheric_chromatic_intensity]
rtol = 1.0e-10
data = "atmospheric_chromatic_intensity.txt"
shape = [48, 48]
specula_test = "test_atmo_propagation.py::TestAtmoPropagation::test_atmo_chromatic_shift_switches"
kind = "atmospheric_intensity"
atol = 1.0e-10
baseline = "specula"
specula_contract = "spectral atmospheric propagation with a chromatic reference wavelength yields a stable broad-band intensity surface"

    [cases.atmospheric_chromatic_intensity.telescope]
    central_obstruction = 0.0
    resolution = 24
    sampling_time = 0.001
    diameter = 8.0

    [cases.atmospheric_chromatic_intensity.atmosphere]
    kind = "finite"
    altitude = [0.0, 10000.0]
    fractional_cn2 = [0.4, 0.6]
    advance_seed = 19
    r0 = 0.2
    wind_speed = [5.0, 9.0]
    advance_steps = 1
    L0 = 25.0
    wind_direction = [0.0, 120.0]

    [cases.atmospheric_chromatic_intensity.source]
    kind = "ngs"
    coordinates = [12.0, 35.0]
    magnitude = 0.0
    band = "I"

        [cases.atmospheric_chromatic_intensity.source.spectrum]
        wavelengths = [7.9e-7, 1.215e-6]
        weights = [0.6, 0.4]

    [cases.atmospheric_chromatic_intensity.propagation]
    kind = "geometric"
    zero_padding = 2
    chromatic_reference_wavelength = 5.89e-7

[cases.curvature_quadratic_signal]
rtol = 1.0e-10
data = "curvature_quadratic_signal.txt"
shape = [144]
specula_test = "test_curvature_sensor.py::TestCurvatureSensor::test_full_chain_focus_response"
kind = "curvature_signal"
atol = 1.0e-10
baseline = "specula"
specula_contract = "low-order quadratic phase produces a non-trivial curvature signal"

    [cases.curvature_quadratic_signal.wfs]
    readout_crop_resolution = 48
    readout_pixels_per_sample = 1
    pupil_samples = 12
    threshold = 0.0
    diffraction_padding = 2
    mode = "diffractive"
    defocus_rms_nm = 500.0
    readout_model = "frame"

    [cases.curvature_quadratic_signal.opd]
    kind = "basis_mode"
    mode_index = 4
    amplitude = 5.0e-8

    [cases.curvature_quadratic_signal.telescope]
    central_obstruction = 0.0
    resolution = 48
    sampling_time = 0.001
    diameter = 8.0

    [cases.curvature_quadratic_signal.basis]
    kind = "cartesian_polynomials"
    n_modes = 4

    [cases.curvature_quadratic_signal.source]
    kind = "ngs"
    magnitude = 0.0
    band = "I"

[cases.pyramid_polychromatic_frame]
rtol = 1.0e-10
data = "pyramid_polychromatic_frame.txt"
shape = [100, 100]
specula_test = "test_poly_chrom_pyramid.py::TestPolyCromPyramid::test_basic_output_shape"
kind = "pyramid_frame"
atol = 1.0e-10
baseline = "specula"
specula_contract = "polychromatic pyramid sensing yields a stable sampled detector-plane frame on the maintained Julia surface"

    [cases.pyramid_polychromatic_frame.wfs]
    n_pix_edge = 10
    binning = 1
    threshold = 0.0
    diffraction_padding = 2
    mode = "diffractive"
    modulation = 3.0
    n_pix_separation = 20
    modulation_points = 16
    pupil_samples = 30

    [cases.pyramid_polychromatic_frame.opd]
    kind = "zeros"

    [cases.pyramid_polychromatic_frame.telescope]
    central_obstruction = 0.0
    resolution = 120
    sampling_time = 0.001
    diameter = 8.0

    [cases.pyramid_polychromatic_frame.source]
    kind = "ngs"
    magnitude = 0.0
    band = "I"

        [cases.pyramid_polychromatic_frame.source.spectrum]
        wavelengths = [5.0e-7, 6.0e-7]
        weights = [1.0, 1.0]

